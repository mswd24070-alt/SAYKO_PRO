<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 دخول الأدمن - سايكو VIP 👑</title>
    <style>
        :root { --cyan: #00f2ff; --bg: #0a0a0a; --card: #151515; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: var(--cyan);
            text-shadow: 0 0 15px var(--cyan);
            font-size: 32px;
            margin-bottom: 30px;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--cyan);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,242,255,0.1);
        }
        h2 {
            color: var(--cyan);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .input-box {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            border: 1px solid #444;
            background: #000;
            color: var(--cyan);
            text-align: center;
            font-size: 18px;
            box-sizing: border-box;
        }
        .input-box:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0,242,255,0.3);
        }
        .login-btn {
            background: var(--cyan);
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s;
        }
        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,242,255,0.4);
        }
        .error {
            color: #ff3333;
            margin-top: 15px;
            font-size: 14px;
            background: rgba(255,51,51,0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ff3333;
        }
        .footer {
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>👑 سايكو VIP 👑</h1>
        <div class="login-card">
            <h2>تسجيل دخول الأدمن</h2>
            <form method="POST" action="/admin-login">
                <input type="password" name="password" class="input-box" placeholder="كلمة المرور" required>
                <button type="submit" class="login-btn">دخول</button>
            </form>
            <div id="error-message" style="display: none;" class="error">❌ كلمة المرور غير صحيحة</div>
        </div>
        <div class="footer">
            بنكك - نظام إدارة الحسابات © 2026
        </div>
    </div>

    <script>
        // عرض رسالة الخطأ إذا وجدت في الرابط
        if (window.location.search.includes('error=1')) {
            document.getElementById('error-message').style.display = 'block';
        }
    </script>
</body>
</html>
